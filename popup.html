<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        width: 380px;
        margin: 0;
        color: #14171f;
        background: #f6f7f9;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        line-height: 1.25;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      section {
        margin-top: 12px;
      }

      .panel,
      .stat {
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        background: #fff;
      }

      .panel {
        padding: 12px;
      }

      .settings {
        display: grid;
        gap: 10px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        font-weight: 700;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat {
        min-height: 68px;
        padding: 10px;
      }

      .stat-value {
        display: block;
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
      }

      .stat-label {
        display: block;
        margin-top: 6px;
        color: #5b6472;
        font-size: 11px;
        line-height: 1.25;
      }

      .chart-wrap {
        height: 180px;
      }

      canvas {
        width: 100%;
        height: 180px;
      }

      .status {
        min-height: 16px;
        margin: 10px 0 0;
        color: #5b6472;
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Study Assistant</h1>

      <section class="panel settings" aria-label="Settings">
        <label class="toggle-row">
          <span>Focus routing</span>
          <input id="focusModeEnabled" type="checkbox">
        </label>
        <label class="toggle-row">
          <span>Homepage study search</span>
          <input id="homepageOverrideEnabled" type="checkbox">
        </label>
      </section>

      <section aria-label="Study analytics">
        <h2>Study Analytics</h2>
        <div class="stats">
          <div class="stat">
            <span id="videosBlocked" class="stat-value">0</span>
            <span class="stat-label">Videos Blocked</span>
          </div>
          <div class="stat">
            <span id="recommendationClicksPrevented" class="stat-value">0</span>
            <span class="stat-label">Recommendation Clicks Prevented</span>
          </div>
          <div class="stat">
            <span id="totalFocusedMinutes" class="stat-value">0</span>
            <span class="stat-label">Total Focused Minutes</span>
          </div>
        </div>
      </section>

      <section class="panel" aria-label="Analytics chart">
        <h2>Focus Breakdown</h2>
        <div class="chart-wrap">
          <canvas id="analyticsChart" aria-label="Analytics chart"></canvas>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>
    </main>

    <!--
      MV3 extension pages cannot load remote script CDNs because of extension
      CSP. Add a local Chart.js build at vendor/chart.umd.min.js in Phase 1
      packaging, or keep the stat cards as the no-dependency fallback.
    -->
    <script src="vendor/chart.umd.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
